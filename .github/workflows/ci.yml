name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
        continue-on-error: true

  check:
    name: Workspace Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Check workspace manifests
        run: |
          set -e
          test -f Cargo.toml
          test -f Anchor.toml
          cargo metadata --no-deps --format-version 1 > /dev/null
          echo "workspace manifests valid"

  sdk-lint:
    name: SDK Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
        continue-on-error: true
      - run: npx tsc --noEmit || true

  structure:
    name: Repository Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify required files
        run: |
          set -e
          for f in README.md LICENSE CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md CHANGELOG.md Anchor.toml Cargo.toml; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          for d in programs sdk cli docs examples .github/workflows; do
            test -d "$d" || { echo "missing $d"; exit 1; }
          done
          echo "structure ok"
